{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login cancelled — CARBOMICA</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #1a6fa0 0%, #268dcd 55%, #4aaee0 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .card { border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,.2); max-width:380px; width:100%; text-align:center; padding:2.5rem 2rem; }
    </style>
</head>
<body>
<div class="card">
    <i class="fas fa-times-circle fa-3x mb-3" style="color:#d33421;"></i>
    <h5 class="fw-bold mb-2">Sign-in cancelled</h5>
    <p class="text-muted small mb-4">
        The Google sign-in was cancelled. No changes were made to your account.
    </p>
    <a href="{% url 'account_login' %}" class="btn w-100 fw-bold"
       style="background:#268dcd;color:white;border-radius:8px;padding:.7rem;">
        <i class="fas fa-redo me-2"></i>Try again
    </a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
