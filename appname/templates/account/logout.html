{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signed out — CARBOMICA</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #1a6fa0 0%, #268dcd 55%, #4aaee0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            max-width: 380px;
            width: 100%;
            text-align: center;
            padding: 2.5rem 2rem;
        }
    </style>
</head>
<body>
<div class="card">
    <img src="{% static 'img/high_horizons_logo.png' %}" alt="HIGH Horizons" style="height:40px;margin-bottom:1rem;">
    <div class="fw-bold text-secondary mb-3" style="font-size:.78rem;letter-spacing:.1em;">CARBOMICA</div>
    <i class="fas fa-check-circle fa-3x mb-3" style="color:#2e8b57;"></i>
    <h5 class="fw-bold mb-2">You've been signed out</h5>
    <p class="text-muted small mb-4">Your session has ended. Sign back in to continue working with your facility data.</p>
    <a href="{% url 'account_login' %}" class="btn w-100 fw-bold"
       style="background:#268dcd;color:white;border-radius:8px;padding:.7rem;">
        <i class="fas fa-sign-in-alt me-2"></i>Sign in again
    </a>
    <p class="text-muted mt-3 mb-0" style="font-size:.75rem;">
        <a href="{% url 'home' %}" class="text-muted">Return to home page</a>
    </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
